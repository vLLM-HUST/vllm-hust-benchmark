name: Upload Benchmark Results to HuggingFace

# 任何分支 push，只要 submissions/ 下有变更就触发
on:
  push:
    paths:
      - 'submissions/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (do not upload to HF)'
        type: boolean
        default: false
      backfill_existing_only:
        description: 'Backfill and republish already-hosted HF submissions without new local submissions'
        type: boolean
        default: false
      submission_dirs:
        description: 'Optional newline-separated submission directories to sync'
        type: string
        required: false
      website_ref:
        description: 'Optional vllm-hust-website ref to use for aggregation/schema checkout'
        type: string
        required: false

env:
  VLLM_HUST_WEBSITE_REF: ${{ github.event.inputs.website_ref || vars.VLLM_HUST_WEBSITE_REF || 'main' }}

permissions:
  contents: read

jobs:
  upload-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout vllm-hust repo
        uses: actions/checkout@v4
        with:
          repository: vLLM-HUST/vllm-hust
          path: vllm-hust

      - name: Checkout website repo (for aggregate script and schema)
        uses: actions/checkout@v4
        with:
          repository: vLLM-HUST/vllm-hust-website
          ref: ${{ env.VLLM_HUST_WEBSITE_REF }}
          path: vllm-hust-website

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e . jsonschema "huggingface_hub>=0.20"

      - name: Validate all submission artifacts
        run: |
          python - << 'PYEOF'
          import json, sys
          from pathlib import Path
          from jsonschema import Draft7Validator
          from vllm_hust_benchmark.submission_artifacts import validate_manifest_artifacts

          schema_path = Path("vllm-hust-website/data/schemas/leaderboard_v1.schema.json")
          if not schema_path.exists():
              print("No schema found — skipping validation")
              sys.exit(0)

          schema = json.loads(schema_path.read_text())
          validator = Draft7Validator(schema)
          errors_found = False

          manifests = sorted(Path("submissions").rglob("leaderboard_manifest.json"))
          if not manifests:
              print("No submission manifests found — nothing to do")
              sys.exit(0)

          errors = validate_manifest_artifacts(manifests=manifests, validator=validator)
          if errors:
              errors_found = True
              for error in errors:
                  print(f"FAIL {error}")
          else:
              for manifest_path in manifests:
                  print(f"OK   {manifest_path}")

          sys.exit(1 if errors_found else 0)
          PYEOF

      - name: Resolve submission directories to sync
        id: resolve-submissions
        run: |
          python - << 'PYEOF'
          import os
          import subprocess
          from pathlib import Path

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          before_sha = os.environ.get("BEFORE_SHA", "")
          current_sha = os.environ.get("GITHUB_SHA", "")
          manual_submission_dirs = os.environ.get("MANUAL_SUBMISSION_DIRS", "")
          submissions_root = Path("submissions")

          submission_dirs: list[str] = []
          if manual_submission_dirs.strip():
              seen: set[str] = set()
              for raw_dir in manual_submission_dirs.splitlines():
                  raw_dir = raw_dir.strip()
                  if not raw_dir:
                      continue
                  candidate = Path(raw_dir)
                  if not candidate.is_absolute():
                      candidate = (Path.cwd() / candidate).resolve()
                  manifest = candidate / "leaderboard_manifest.json"
                  if manifest.is_file():
                      resolved = str(candidate)
                      if resolved not in seen:
                          seen.add(resolved)
                          submission_dirs.append(resolved)
          elif event_name == "push" and before_sha and current_sha and before_sha != "0000000000000000000000000000000000000000":
              diff_output = subprocess.check_output(
                  ["git", "diff", "--name-only", before_sha, current_sha, "--", "submissions"],
                  text=True,
              )
              seen: set[str] = set()
              for raw_path in diff_output.splitlines():
                  path = Path(raw_path.strip())
                  if len(path.parts) < 2 or path.parts[0] != "submissions":
                      continue
                  candidate = submissions_root / path.parts[1]
                  manifest = candidate / "leaderboard_manifest.json"
                  if manifest.is_file():
                      resolved = str(candidate.resolve())
                      if resolved not in seen:
                          seen.add(resolved)
                          submission_dirs.append(resolved)
          else:
              submission_dirs = [str(path.parent.resolve()) for path in sorted(submissions_root.rglob("leaderboard_manifest.json"))]

          print("Submission dirs to sync:")
          for item in submission_dirs:
              print(f"- {item}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"count={len(submission_dirs)}\n")
              fh.write("dirs<<EOF\n")
              for item in submission_dirs:
                  fh.write(item + "\n")
              fh.write("EOF\n")
          PYEOF
        env:
          BEFORE_SHA: ${{ github.event.before }}
          MANUAL_SUBMISSION_DIRS: ${{ github.event.inputs.submission_dirs }}

      - name: Sync submissions into HF leaderboard snapshots
        if: ${{ steps.resolve-submissions.outputs.count != '0' || github.event.inputs.backfill_existing_only == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.DATASET_WRITE_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          BACKFILL_EXISTING_ONLY: ${{ github.event.inputs.backfill_existing_only || 'false' }}
          VLLM_HUST_REPO: ${{ github.workspace }}/vllm-hust
          VLLM_HUST_WEBSITE_REPO: ${{ github.workspace }}/vllm-hust-website
        run: |
          if [[ -z "${HF_TOKEN:-}" ]]; then
            echo "ERROR: DATASET_WRITE_TOKEN secret is not set."
            exit 1
          fi

          extra_args=()
          if [[ "$DRY_RUN" == "true" ]]; then
            extra_args+=(--dry-run)
          fi
          if [[ "$BACKFILL_EXISTING_ONLY" == "true" ]]; then
            extra_args+=(--existing-only)
          fi

          submission_args=()
          while IFS= read -r submission_dir; do
            [[ -z "$submission_dir" ]] && continue
            echo "=== queueing $submission_dir ==="
            submission_args+=(--submission-dir "$submission_dir")
          done <<< "${{ steps.resolve-submissions.outputs.dirs }}"

          if [[ ${#submission_args[@]} -eq 0 && "$BACKFILL_EXISTING_ONLY" != "true" ]]; then
            echo "No submission directories resolved; nothing to sync."
            exit 0
          fi

          PYTHONPATH=src python -m vllm_hust_benchmark.cli sync-submission-to-hf \
            "${submission_args[@]}" \
            --aggregate-output-dir /tmp/leaderboard-data \
            --repo-id intellistream/vllm-hust-benchmark-results \
            --submissions-prefix submissions-auto \
            --commit-message "chore: sync benchmark submission and leaderboard data from ${GITHUB_REF} @ ${GITHUB_SHA::8}" \
            --execute \
            "${extra_args[@]}"

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' && (steps.resolve-submissions.outputs.count != '0' || github.event.inputs.backfill_existing_only == 'true') }}
        run: |
          echo "=== DRY RUN: files that would be uploaded ==="
          ls -lh /tmp/leaderboard-data/

      - name: No submissions to sync
        if: ${{ steps.resolve-submissions.outputs.count == '0' && github.event.inputs.backfill_existing_only != 'true' }}
        run: echo "No submission directories matched this event; nothing to upload."
