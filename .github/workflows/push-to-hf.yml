name: Upload Benchmark Results to HuggingFace

# 任何分支 push，只要 submissions/ 下有变更就触发
on:
  push:
    paths:
      - 'submissions/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (do not upload to HF)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  upload-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v4

      - name: Checkout website repo (for aggregate script and schema)
        uses: actions/checkout@v4
        with:
          repository: intellistream/vllm-hust-website
          path: vllm-hust-website

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jsonschema "huggingface_hub>=0.20"

      - name: Validate all submission artifacts
        run: |
          python - << 'PYEOF'
          import json, sys
          from pathlib import Path
          from jsonschema import Draft7Validator

          schema_path = Path("vllm-hust-website/data/schemas/leaderboard_v1.schema.json")
          if not schema_path.exists():
              print("No schema found — skipping validation")
              sys.exit(0)

          schema = json.loads(schema_path.read_text())
          validator = Draft7Validator(schema)
          errors_found = False

          manifests = sorted(Path("submissions").rglob("leaderboard_manifest.json"))
          if not manifests:
              print("No submission manifests found — nothing to do")
              sys.exit(0)

          for manifest_path in manifests:
              artifact_path = manifest_path.parent / "run_leaderboard.json"
              if not artifact_path.exists():
                  print(f"WARNING: manifest present but artifact missing: {artifact_path}")
                  continue
              artifact = json.loads(artifact_path.read_text())
              errs = sorted(validator.iter_errors(artifact), key=lambda e: list(e.path))
              if errs:
                  print(f"FAIL {artifact_path}: {errs[0].message[:120]} @ {list(errs[0].path)}")
                  errors_found = True
              else:
                  print(f"OK   {artifact_path}")

          sys.exit(1 if errors_found else 0)
          PYEOF

      - name: Aggregate submissions into leaderboard JSON
        run: |
          python vllm-hust-website/scripts/aggregate_results.py \
            --source-dir submissions \
            --output-dir /tmp/leaderboard-data

      - name: Show aggregated stats
        run: |
          echo "Single entries: $(python -c "import json; print(len(json.load(open('/tmp/leaderboard-data/leaderboard_single.json'))))")"
          echo "Multi  entries: $(python -c "import json; print(len(json.load(open('/tmp/leaderboard-data/leaderboard_multi.json'))))")"

      - name: Upload to HuggingFace
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'PYEOF'
          import os, sys
          from pathlib import Path
          from huggingface_hub import HfApi, CommitOperationAdd

          token = os.environ.get("HF_TOKEN")
          if not token:
              print("ERROR: HF_TOKEN secret is not set.")
              print("Go to: GitHub repo → Settings → Secrets → Actions → New secret")
              print("Name: HF_TOKEN, Value: your HuggingFace write token")
              sys.exit(1)

          repo_id = "intellistream/vllm-hust-benchmark-results"
          data_dir = Path("/tmp/leaderboard-data")
          filenames = [
              "leaderboard_single.json",
              "leaderboard_multi.json",
              "leaderboard_compare.json",
              "last_updated.json",
          ]

          api = HfApi(token=token)
          operations = []
          for name in filenames:
              p = data_dir / name
              if p.exists():
                  size_kb = p.stat().st_size / 1024
                  print(f"  staging {name}  ({size_kb:.1f} KB)")
                  operations.append(CommitOperationAdd(path_in_repo=name, path_or_fileobj=p))

          ref = os.environ.get("GITHUB_REF", "unknown")
          sha = os.environ.get("GITHUB_SHA", "")[:8]
          commit = api.create_commit(
              repo_id=repo_id,
              repo_type="dataset",
              branch="main",
              operations=operations,
              commit_message=f"chore: update leaderboard from {ref} @ {sha}",
          )
          print(f"✅ Uploaded {len(operations)} file(s)")
          print(f"   commit: {getattr(commit, 'commit_url', commit)}")
          PYEOF

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== DRY RUN: files that would be uploaded ==="
          ls -lh /tmp/leaderboard-data/
