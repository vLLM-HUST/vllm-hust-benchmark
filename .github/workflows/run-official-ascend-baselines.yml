name: Run Official Ascend Baselines

'on':
  workflow_dispatch:
    inputs:
      spec_paths:
        description: Optional newline-separated spec files or directories. Defaults to docs/official-baselines.
        required: false
        type: string
        default: ""
      repeat_count:
        description: Repeat count for specs that do not yet have a canonical run.
        required: false
        type: number
        default: 3
      min_successful_repeats:
        description: Minimum number of successful repeats required to accept a canonical candidate. Use 0 for the workflow default.
        required: false
        type: number
        default: 0
      max_repeat_attempts:
        description: Maximum repeat attempts per missing-canonical spec, including retries after transient failures. Use 0 for the workflow default.
        required: false
        type: number
        default: 0
      force_run_existing:
        description: Re-run even when canonical submissions already exist. Existing canonical submissions are preserved.
        required: false
        type: boolean
        default: false
      prepare_official_env:
        description: Prepare or repair the pinned official baseline conda env before running.
        required: false
        type: boolean
        default: true
      publish_website:
        description: Rebuild the checked-out local website data directory after the batch. This does not publish live benchmark snapshots.
        required: false
        type: boolean
        default: false
      publish_results:
        description: Publish promoted official canonical submissions to vllm-hust-benchmark@main and refresh live leaderboard snapshots.
        required: false
        type: boolean
        default: true
      force_repair_official_env:
        description: Skip the prepare-script health check and force a full repair/reinstall of the official env.
        required: false
        type: boolean
        default: false
      publication_target_branch:
        description: Target branch in vLLM-HUST/vllm-hust-benchmark for formal publication.
        required: false
        type: string
        default: main
      website_ref:
        description: Optional vllm-hust-website ref to use when publish_website is enabled.
        required: false
        type: string
        default: main
      goal_baseline_env_prefix:
        description: Optional conda env prefix for the official v0.11.0 baseline runtime. Leave blank to resolve from conda info --base on the runner.
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-official-baselines:
    runs-on:
      - self-hosted
      - ARM64
      - docker
      - debug
    timeout-minutes: 360
    env:
      BENCHMARK_CHECKOUT_USE_SSH: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY != '' && '1' || '0' }}
      VLLM_HUST_WORKSPACE_ROOT: ${{ github.workspace }}
      HOME: ${{ github.workspace }}/.ci-home
      XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
      XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_ENDPOINT: ${{ vars.HF_ENDPOINT || 'https://hf-mirror.com' }}
      HF_HOME: ${{ github.workspace }}/../.hf-cache
      HUGGINGFACE_HUB_CACHE: ${{ github.workspace }}/../.hf-cache/hub
      TRANSFORMERS_CACHE: ${{ github.workspace }}/../.hf-cache/transformers
      MATRIX_RUN_ID: official-ascend-baseline-${{ github.run_id }}-${{ github.run_attempt }}
      MATRIX_RESULT_ROOT: ${{ github.workspace }}/.benchmarks/official-ascend-baseline-${{ github.run_id }}-${{ github.run_attempt }}
      MATRIX_SUMMARY_FILE: ${{ github.workspace }}/artifacts/official-baseline/summary.md
      REPEAT_COUNT: ${{ github.event.inputs.repeat_count || 3 }}
      FORCE_RUN_EXISTING: ${{ github.event.inputs.force_run_existing == 'true' && '1' || '0' }}
      PREPARE_OFFICIAL_ENV: ${{ github.event.inputs.prepare_official_env == 'false' && '0' || '1' }}
      FORCE_REPAIR_OFFICIAL_ENV: ${{ github.event.inputs.force_repair_official_env == 'true' && '1' || '0' }}
      PUBLISH_WEBSITE: ${{ github.event.inputs.publish_website == 'true' && '1' || '0' }}
      PUBLISH_RESULTS: ${{ github.event.inputs.publish_results == 'false' && '0' || '1' }}
      PUBLICATION_TARGET_BRANCH: ${{ github.event.inputs.publication_target_branch || 'main' }}
      VLLM_HUST_WEBSITE_REF: ${{ github.event.inputs.website_ref || 'main' }}
      ASCEND_RT_VISIBLE_DEVICES: ${{ vars.VLLM_ASCEND_HUST_BENCHMARK_VISIBLE_DEVICES || '' }}
    steps:
      - name: Pre-clean generated directories
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$GITHUB_WORKSPACE/reference-repos" \
             "$GITHUB_WORKSPACE/.ci-home" \
             "$GITHUB_WORKSPACE/vllm-hust-website" \
             "$GITHUB_WORKSPACE/publication-target" \
             "$GITHUB_WORKSPACE/.benchmarks" \
             "$GITHUB_WORKSPACE/artifacts"
          mkdir -p "$HOME" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME"
          mkdir -p "$GITHUB_WORKSPACE/artifacts/official-baseline"

      - name: Require GitHub SSH checkout key
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BENCHMARK_CHECKOUT_USE_SSH" != "1" ]]; then
            echo "VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY is required because this workflow checks out repositories over SSH." >&2
            exit 1
          fi

      - name: Configure GitHub SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh_dir="$HOME/.ssh"
          config_file="$ssh_dir/config"
          key_file="$ssh_dir/github_actions"

          if [[ ! -d "$ssh_dir" ]]; then
            mkdir -p "$ssh_dir"
          fi
          chmod 700 "$ssh_dir"

          printf '%s\n' '${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}' > "$key_file"
          chmod 600 "$key_file"

          config_block="$(cat <<'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/github_actions
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF
          )"

          if [[ ! -f "$config_file" ]]; then
            printf '%s\n' "$config_block" > "$config_file"
          elif ! grep -Fq 'Host github.com' "$config_file" \
            || ! grep -Fq 'HostName github.com' "$config_file" \
            || ! grep -Fq 'IdentityFile ~/.ssh/github_actions' "$config_file"; then
            printf '\n%s\n' "$config_block" >> "$config_file"
          fi

          chmod 600 "$config_file"

      - name: Checkout benchmark repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: false
          persist-credentials: false

      - name: Checkout upstream vllm reference repo
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm
          path: reference-repos/vllm
          fetch-depth: 0
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: false
          persist-credentials: false

      - name: Checkout upstream vllm-ascend reference repo
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm-ascend
          path: reference-repos/vllm-ascend
          fetch-depth: 0
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: false
          persist-credentials: false

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: vLLM-HUST/vllm-hust-website
          ref: ${{ env.VLLM_HUST_WEBSITE_REF }}
          path: vllm-hust-website
          fetch-depth: 1
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: false
          persist-credentials: false

      - name: Checkout benchmark publication target
        if: ${{ env.PUBLISH_RESULTS == '1' }}
        uses: actions/checkout@v4
        with:
          repository: vLLM-HUST/vllm-hust-benchmark
          ref: ${{ env.PUBLICATION_TARGET_BRANCH }}
          path: publication-target/vllm-hust-benchmark
          fetch-depth: 0
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: false
          persist-credentials: false

      - name: Resolve host Python
        shell: bash
        run: |
          set -euo pipefail

          resolve_host_python() {
            if command -v python3 >/dev/null 2>&1; then
              command -v python3
              return 0
            fi

            if command -v python >/dev/null 2>&1; then
              command -v python
              return 0
            fi

            if command -v conda >/dev/null 2>&1; then
              local conda_base
              conda_base="$(conda info --base 2>/dev/null || true)"
              if [[ -n "$conda_base" ]] && [[ -x "$conda_base/bin/python" ]]; then
                printf '%s\n' "$conda_base/bin/python"
                return 0
              fi
            fi

            return 1
          }

          host_python="$(resolve_host_python)" || {
            echo "Could not locate a host Python interpreter for benchmark repo utilities" >&2
            exit 1
          }

          "$host_python" -c 'import sys; version = sys.version.split()[0]; raise SystemExit(0 if sys.version_info >= (3, 10) else f"Python {version} is too old for vllm-hust-benchmark; require >= 3.10")'
          host_python_version="$($host_python -c 'import sys; print(sys.version.split()[0])')"

          printf 'PYTHON_BIN=%s\n' "$host_python" >> "$GITHUB_ENV"
          printf 'HOST_PYTHON_BIN=%s\n' "$host_python" >> "$GITHUB_ENV"
          echo "Resolved host Python: $host_python ($host_python_version)"

      - name: Install publication aggregation dependency
        if: ${{ env.PUBLISH_RESULTS == '1' || env.PUBLISH_WEBSITE == '1' }}
        shell: bash
        env:
          HOST_PYTHON_BIN: ${{ env.HOST_PYTHON_BIN }}
        run: |
          set -euo pipefail

          resolve_pip_python() {
            local candidate="${HOST_PYTHON_BIN:-}"
            local conda_exe_env="${CONDA_EXE:-}"
            local conda_base=""
            local root=""
            local search_roots=(
              "$HOME/miniconda3"
              "$HOME/anaconda3"
              "$HOME/miniforge3"
              "$HOME/mambaforge"
              "/home/grunner/miniconda3"
              "/root/miniconda3"
              "/opt/conda"
              "/usr/local/miniconda3"
              "/usr/local/anaconda3"
            )

            if [[ -n "$candidate" ]] && [[ -x "$candidate" ]] && "$candidate" -m pip --version >/dev/null 2>&1; then
              printf '%s\n' "$candidate"
              return 0
            fi

            if [[ -n "$conda_exe_env" ]] && [[ -x "$conda_exe_env" ]]; then
              if [[ "$conda_exe_env" == */condabin/conda ]]; then
                conda_base="${conda_exe_env%/condabin/conda}"
              else
                conda_base="$(dirname "$(dirname "$conda_exe_env")")"
              fi
            elif command -v conda >/dev/null 2>&1; then
              conda_base="$(conda info --base 2>/dev/null || true)"
            fi

            if [[ -n "$conda_base" ]] && [[ -x "$conda_base/bin/python" ]] && "$conda_base/bin/python" -m pip --version >/dev/null 2>&1; then
              printf '%s\n' "$conda_base/bin/python"
              return 0
            fi

            for root in "${search_roots[@]}"; do
              [[ -z "$root" ]] && continue
              if [[ -x "$root/bin/python" ]] && "$root/bin/python" -m pip --version >/dev/null 2>&1; then
                printf '%s\n' "$root/bin/python"
                return 0
              fi
            done

            return 1
          }

          pip_python="$(resolve_pip_python)" || {
            echo "Could not locate a pip-capable Python interpreter for publication aggregation dependency installation" >&2
            exit 1
          }

          if [[ "$pip_python" != "${HOST_PYTHON_BIN:-}" ]]; then
            printf 'HOST_PYTHON_BIN=%s\n' "$pip_python" >> "$GITHUB_ENV"
            printf 'PYTHON_BIN=%s\n' "$pip_python" >> "$GITHUB_ENV"
            echo "Switched host Python to pip-capable interpreter: $pip_python"
          fi

          "$pip_python" -m pip install --user --disable-pip-version-check 'jsonschema>=4'

      - name: Resolve conda base
        shell: bash
        env:
          HOST_PYTHON_BIN: ${{ env.HOST_PYTHON_BIN }}
        run: |
          set -euo pipefail

          resolve_conda_base() {
            local host_python=${1:-}
            local candidate=""
            local conda_exe_env="${CONDA_EXE:-}"

            if [[ -n "$conda_exe_env" ]] && [[ -x "$conda_exe_env" ]]; then
              if [[ "$conda_exe_env" == */condabin/conda ]]; then
                printf '%s\n' "${conda_exe_env%/condabin/conda}"
              else
                printf '%s\n' "$(dirname "$(dirname "$conda_exe_env")")"
              fi
              return 0
            fi

            if command -v conda >/dev/null 2>&1; then
              conda info --base
              return 0
            fi

            if [[ -n "$host_python" ]]; then
              case "$host_python" in
                */envs/*/bin/python|*/envs/*/bin/python3)
                  printf '%s\n' "${host_python%%/envs/*}"
                  return 0
                  ;;
                */bin/python|*/bin/python3)
                  candidate="$(dirname "$(dirname "$host_python")")"
                  if [[ -x "$candidate/condabin/conda" ]] || [[ -x "$candidate/bin/conda" ]]; then
                    printf '%s\n' "$candidate"
                    return 0
                  fi
                  ;;
              esac
            fi

            local search_roots=(
              "$HOME/miniconda3"
              "$HOME/anaconda3"
              "$HOME/miniforge3"
              "$HOME/mambaforge"
              "/home/grunner/miniconda3"
              "/root/miniconda3"
              "/opt/conda"
              "/usr/local/miniconda3"
              "/usr/local/anaconda3"
            )
            local root
            for root in "${search_roots[@]}"; do
              [[ -z "$root" ]] && continue
              if [[ -x "$root/condabin/conda" ]] || [[ -x "$root/bin/conda" ]]; then
                printf '%s\n' "$root"
                return 0
              fi
            done

            return 1
          }

          conda_base="$(resolve_conda_base "${HOST_PYTHON_BIN:-}")" || {
            echo "Could not locate conda on the runner; ensure Miniconda/Anaconda is installed and accessible to the runner service" >&2
            exit 1
          }

          if [[ -x "$conda_base/condabin/conda" ]]; then
            conda_exe="$conda_base/condabin/conda"
          elif [[ -x "$conda_base/bin/conda" ]]; then
            conda_exe="$conda_base/bin/conda"
          else
            echo "Resolved conda base does not contain a runnable conda executable: $conda_base" >&2
            exit 1
          fi

          [[ -d "$conda_base/condabin" ]] && printf '%s\n' "$conda_base/condabin" >> "$GITHUB_PATH"
          [[ -d "$conda_base/bin" ]] && printf '%s\n' "$conda_base/bin" >> "$GITHUB_PATH"
          printf 'CONDA_BASE=%s\n' "$conda_base" >> "$GITHUB_ENV"
          printf 'CONDA_EXE=%s\n' "$conda_exe" >> "$GITHUB_ENV"
          echo "Resolved conda base: $conda_base"

      - name: Resolve official env prefix
        shell: bash
        env:
          GOAL_BASELINE_ENV_PREFIX_INPUT: ${{ github.event.inputs.goal_baseline_env_prefix || '' }}
          CONDA_BASE: ${{ env.CONDA_BASE }}
          CONDA_EXE: ${{ env.CONDA_EXE }}
        run: |
          set -euo pipefail
          env_prefix="${GOAL_BASELINE_ENV_PREFIX_INPUT}"
          if [[ -z "${env_prefix//[[:space:]]/}" ]]; then
            if [[ -n "${CONDA_BASE:-}" ]]; then
              env_prefix="$CONDA_BASE/envs/vllm-ascend-official-v0110"
            else
              env_prefix="$("${CONDA_EXE:-conda}" info --base)/envs/vllm-ascend-official-v0110"
            fi
          fi

          printf 'GOAL_BASELINE_ENV_PREFIX=%s\n' "$env_prefix" >> "$GITHUB_ENV"
          echo "Resolved GOAL_BASELINE_ENV_PREFIX=$env_prefix"
          echo "FORCE_REPAIR_OFFICIAL_ENV=$FORCE_REPAIR_OFFICIAL_ENV"

      - name: Resolve spec arguments
        id: resolve-specs
        shell: bash
        env:
          SPEC_PATHS_INPUT: ${{ github.event.inputs.spec_paths || '' }}
        run: |
          set -euo pipefail
          if [[ -z "${SPEC_PATHS_INPUT//[[:space:]]/}" ]]; then
            {
              echo 'args<<EOF'
              echo 'docs/official-baselines'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo 'args<<EOF'
            while IFS= read -r line; do
              [[ -z "${line//[[:space:]]/}" ]] && continue
              printf '%s\n' "$line"
            done <<< "$SPEC_PATHS_INPUT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run official baseline matrix
        id: run-matrix
        shell: bash
        env:
          CLIENT_READY_CHECK_TIMEOUT_SECONDS: 900
          DEVICE_SELECTION_RETRIES: 20
          DEVICE_SELECTION_RETRY_DELAY_SECONDS: 30
          READY_TIMEOUT_SECONDS: 900
          READY_STATUS_INTERVAL_SECONDS: 30
          BENCHMARK_REPO_SSH_KEY: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          MIN_SUCCESSFUL_REPEATS_INPUT: ${{ github.event.inputs.min_successful_repeats || 0 }}
          MAX_REPEAT_ATTEMPTS_INPUT: ${{ github.event.inputs.max_repeat_attempts || 0 }}
        run: |
          set -euo pipefail
          spec_args=()
          while IFS= read -r item; do
            [[ -z "$item" ]] && continue
            spec_args+=("$item")
          done <<< "${{ steps.resolve-specs.outputs.args }}"

          if [[ ${#spec_args[@]} -eq 0 ]]; then
            spec_args+=("docs/official-baselines")
          fi

          if [[ "${MIN_SUCCESSFUL_REPEATS_INPUT:-0}" =~ ^[1-9][0-9]*$ ]]; then
            export MIN_SUCCESSFUL_REPEATS="$MIN_SUCCESSFUL_REPEATS_INPUT"
          fi
          if [[ "${MAX_REPEAT_ATTEMPTS_INPUT:-0}" =~ ^[1-9][0-9]*$ ]]; then
            export MAX_REPEAT_ATTEMPTS="$MAX_REPEAT_ATTEMPTS_INPUT"
          fi

          if [[ "$PUBLISH_RESULTS" == "1" ]]; then
            export EXISTING_CANONICAL_SUBMISSIONS_ROOT="$GITHUB_WORKSPACE/publication-target/vllm-hust-benchmark/submissions"
            export PUBLICATION_SYNC_HELPER="$GITHUB_WORKSPACE/.github/workflows/scripts/sync_official_baseline_snapshots_to_github.sh"
            export TARGET_BENCHMARK_REPO_DIR="$GITHUB_WORKSPACE/publication-target/vllm-hust-benchmark"
            export WEBSITE_REPO_DIR="$GITHUB_WORKSPACE/vllm-hust-website"
            export SNAPSHOT_TARGET_BRANCH="$PUBLICATION_TARGET_BRANCH"
            export LOCAL_SNAPSHOT_OUTPUT_DIR="$GITHUB_WORKSPACE/artifacts/official-baseline/published-snapshots"
            export PUBLICATION_COMMIT_MESSAGE_PREFIX="chore(data): publish official ascend baseline"
            export BENCHMARK_REPO_SLUG="vLLM-HUST/vllm-hust-benchmark"
            export BENCHMARK_REPO_REMOTE="origin"
          fi

          bash scripts/run-official-ascend-goal-baseline-matrix.sh "${spec_args[@]}"

      - name: Publish official baseline snapshots
        if: ${{ steps.run-matrix.outcome == 'success' && env.PUBLISH_RESULTS == '1' }}
        shell: bash
        env:
          SOURCE_BENCHMARK_REPO_DIR: ${{ github.workspace }}
          TARGET_BENCHMARK_REPO_DIR: ${{ github.workspace }}/publication-target/vllm-hust-benchmark
          WEBSITE_REPO_DIR: ${{ github.workspace }}/vllm-hust-website
          PYTHON_BIN: ${{ env.HOST_PYTHON_BIN }}
          SNAPSHOT_TARGET_BRANCH: ${{ env.PUBLICATION_TARGET_BRANCH }}
          LOCAL_SNAPSHOT_OUTPUT_DIR: ${{ github.workspace }}/artifacts/official-baseline/published-snapshots
          SNAPSHOT_COMMIT_MESSAGE: "chore(data): publish official ascend baselines from run ${{ github.run_id }}-${{ github.run_attempt }}"
          BENCHMARK_REPO_SLUG: vLLM-HUST/vllm-hust-benchmark
          BENCHMARK_REPO_REMOTE: origin
          BENCHMARK_REPO_SSH_KEY: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ALLOW_EMPTY_SNAPSHOT_SOURCE: "1"
        run: |
          set -euo pipefail
          bash .github/workflows/scripts/sync_official_baseline_snapshots_to_github.sh

      - name: Summarize publication result
        if: ${{ always() && steps.run-matrix.outcome == 'success' && env.PUBLISH_RESULTS == '1' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "- Snapshot publication status: ${GITHUB_SNAPSHOT_SYNC_STATUS:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "${GITHUB_SNAPSHOT_SYNC_COMMIT:-}" ]]; then
            echo "- Snapshot publication commit: ${GITHUB_SNAPSHOT_SYNC_COMMIT}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload official baseline summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-baseline-summary-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/official-baseline/summary.md
          if-no-files-found: warn
          retention-days: 14

      - name: Upload official baseline results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-baseline-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .benchmarks/official-ascend-baseline-${{ github.run_id }}-${{ github.run_attempt }}
            artifacts/official-baseline/published-snapshots
            submissions/official-ascend-*
          if-no-files-found: warn
          retention-days: 14