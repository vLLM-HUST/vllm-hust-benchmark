name: Notify Website Leaderboard Update

on:
  push:
    branches: [main]
    paths:
      - 'leaderboard-data/snapshots/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website leaderboard sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_DISPATCH_TOKEN }}
          repository: vLLM-HUST/vllm-hust-website
          event-type: leaderboard-update
          client-payload: '{"source_repo": "${{ github.repository }}", "commit": "${{ github.sha }}"}'
