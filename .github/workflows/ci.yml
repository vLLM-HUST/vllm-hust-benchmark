name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      BENCHMARK_CHECKOUT_USE_SSH_443: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY != '' && '1' || '0' }}
    steps:
      - name: Require GitHub SSH checkout key
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BENCHMARK_CHECKOUT_USE_SSH_443" != "1" ]]; then
            echo "VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY is required because this workflow checks out repositories over SSH." >&2
            exit 1
          fi

      - name: Configure GitHub SSH over 443
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' '${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}' > "$HOME/.ssh/github_actions"
          chmod 600 "$HOME/.ssh/github_actions"
          cat > "$HOME/.ssh/config" <<'EOF'
          Host github.com
            HostName ssh.github.com
            Port 443
            User git
            HostKeyAlias github.com
            IdentityFile ~/.ssh/github_actions
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF
          chmod 600 "$HOME/.ssh/config"
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf https://github.com/

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        env:
          HOME: ${{ github.workspace }}/.ci-home
          XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
          XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
        run: |
          mkdir -p "$HOME" "$XDG_CACHE_HOME" "$XDG_CONFIG_HOME"
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run pytest
        env:
          HOME: ${{ github.workspace }}/.ci-home
          XDG_CACHE_HOME: ${{ github.workspace }}/.ci-home/.cache
          XDG_CONFIG_HOME: ${{ github.workspace }}/.ci-home/.config
        run: python -m pytest -q tests --junitxml=pytest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vllm-hust-benchmark-pytest-${{ github.run_id }}-${{ github.run_attempt }}
          path: pytest-results.xml
          if-no-files-found: warn
          retention-days: 14